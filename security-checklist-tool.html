<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Testing Checklist Tool</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#141720;--bg2:#1e2335;--bg3:#262d42;--bg4:#2e3650;
    --border:#353d5c;--border2:#4a5578;
    --text:#f0f2ff;--text2:#b8c2e8;--text3:#8896c8;
    --accent:#4f6ef7;--accent2:#6c89fa;--accent3:#3a56e0;
    --crit:#f05252;--high:#f59e0b;--med:#10b981;--low:#60a5fa;--info:#94a3b8;
    --pass:#10b981;--fail:#f05252;--na:#64748b;
    --radius:8px;--radius2:12px;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  
  /* SIDEBAR */
  #sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .2s}
  #sidebar-logo{padding:16px;border-bottom:1px solid var(--border)}
  #sidebar-logo h1{font-size:14px;font-weight:700;color:var(--text);letter-spacing:.5px}
  #sidebar-logo p{font-size:11px;color:var(--text2);margin-top:2px}
  #project-section{padding:12px;border-bottom:1px solid var(--border)}
  #project-section label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px}
  #project-list{list-style:none;max-height:180px;overflow-y:auto}
  #project-list li{padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text);display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
  #project-list li:hover{background:var(--bg3)}
  #project-list li.active{background:var(--accent3);color:#fff}
  #project-list li .proj-del{opacity:0;font-size:11px;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:4px}
  #project-list li:hover .proj-del{opacity:1}
  #project-list li.active .proj-del{color:rgba(255,255,255,.6)}
  .btn-new-proj{width:100%;margin-top:8px;padding:7px;background:var(--accent3);border:none;border-radius:6px;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;justify-content:center}
  .btn-new-proj:hover{background:var(--accent)}
  #sidebar-stats{padding:12px;border-bottom:1px solid var(--border)}
  #sidebar-stats label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:8px}
  .stat-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;color:var(--text)}
  .stat-row span:last-child{font-weight:600;color:var(--text)}
  #sidebar-actions{padding:12px;margin-top:auto}
  .sidebar-btn{width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .sidebar-btn:hover{background:var(--bg4);color:var(--text)}
  .sidebar-btn svg{flex-shrink:0}

  /* MAIN */
  #main{margin-left:240px;min-height:100vh;display:flex;flex-direction:column}
  #topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  #proj-name-input{background:transparent;border:none;color:var(--text);font-size:16px;font-weight:600;outline:none;min-width:200px;max-width:400px}
  #proj-name-input:hover{background:var(--bg3);border-radius:4px;padding:2px 6px;margin:-2px -6px}
  #proj-name-input:focus{background:var(--bg3);border-radius:4px;padding:2px 6px;margin:-2px -6px}
  .topbar-right{display:flex;gap:8px;align-items:center}
  .btn-primary{padding:7px 14px;background:var(--accent3);border:none;border-radius:6px;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px}
  .btn-primary:hover{background:var(--accent)}
  .btn-ghost{padding:7px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;cursor:pointer}
  .btn-ghost:hover{background:var(--bg4);color:var(--text)}

  /* TABS */
  #tab-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:4px;overflow-x:auto}
  .tab{padding:10px 16px;border:none;background:transparent;color:var(--text2);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px}
  .tab:hover{color:var(--text2)}
  .tab.active{color:var(--accent2);border-bottom-color:var(--accent2);font-weight:500}
  .tab-badge{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--bg4);color:var(--text3)}
  .tab.active .tab-badge{background:rgba(79,110,247,.2);color:var(--accent2)}

  /* FILTERS */
  #filter-bar{padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .filter-group{display:flex;gap:4px;align-items:center}
  .filter-label{font-size:11px;color:var(--text2);margin-right:4px;font-weight:600}
  .filter-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer}
  .filter-btn:hover{background:var(--bg3)}
  .filter-btn.active{color:#fff;border-color:transparent}
  .filter-btn.all.active{background:var(--accent3)}
  .filter-btn.Critical.active{background:var(--crit)}
  .filter-btn.High.active{background:var(--high);color:#000}
  .filter-btn.Medium.active{background:var(--med)}
  .filter-btn.Low.active{background:var(--low);color:#1e3a5f}
  .filter-btn.Informational.active{background:var(--info);color:#1e2a3a}
  .filter-btn.Pass.active{background:var(--pass)}
  .filter-btn.Fail.active{background:var(--fail)}
  .filter-btn.NA.active{background:var(--na)}
  #search-box{margin-left:auto;padding:6px 12px;background:var(--bg4);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:13px;outline:none;width:260px}
  #search-box:focus{border-color:var(--accent2);background:var(--bg3)}

  /* CONTENT */
  #content{padding:16px 20px;flex:1}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:10px 14px;background:var(--bg3);border-radius:var(--radius);border-left:3px solid var(--accent3)}
  .section-header h3{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.8px}
  .section-count{font-size:11px;color:var(--text2)}
  .btn-add-item{padding:4px 10px;background:transparent;border:1px dashed var(--border2);border-radius:5px;color:var(--text3);font-size:11px;cursor:pointer}
  .btn-add-item:hover{background:var(--bg3);color:var(--text2)}

  /* CHECKLIST ITEM */
  .checklist-item{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);margin-bottom:8px;overflow:hidden;transition:border-color .15s}
  .checklist-item:hover{border-color:var(--accent3)}
  .checklist-item.expanded{border-color:var(--accent3)}
  .item-header{padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:default}
  .item-num{font-size:11px;color:var(--text2);min-width:22px;margin-top:1px;font-weight:600}
  .item-body{flex:0 0 53%;max-width:53%;min-width:0}
  .item-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.4}
  .item-meta{display:none}
  .sev-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:.3px}
  .sev-Critical{background:rgba(240,82,82,.15);color:#f87171;border:1px solid rgba(240,82,82,.3)}
  .sev-High{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
  .sev-Medium{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.25)}
  .sev-Low{background:rgba(96,165,250,.12);color:#93c5fd;border:1px solid rgba(96,165,250,.25)}
  .sev-Informational,.sev-Info{background:rgba(148,163,184,.1);color:#94a3b8;border:1px solid rgba(148,163,184,.2)}
  .item-category{font-size:11px;color:var(--text2)}
  .item-click-zone{flex:1 1 auto;min-width:24px;cursor:pointer;align-self:stretch;display:flex;align-items:center;user-select:none}
  .item-controls{display:flex;gap:8px;align-items:center;flex-shrink:0}
  .status-select{padding:4px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text2);font-size:11px;cursor:pointer;outline:none}
  .status-select.Pass{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:#34d399}
  .status-select.Fail{background:rgba(240,82,82,.15);border-color:rgba(240,82,82,.4);color:#f87171}
  .status-select.NA{background:rgba(100,116,139,.15);border-color:rgba(100,116,139,.4);color:#94a3b8}
  .chevron{transition:transform .15s;color:var(--text2);font-size:12px}
  .expanded .chevron{transform:rotate(180deg)}
  
  /* EXPANDED FIELDS */
  .item-detail{padding:0 14px 16px;border-top:1px solid var(--border2);background:var(--bg2);display:none}
  .expanded .item-detail{display:block;padding-top:12px}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .detail-field{display:flex;flex-direction:column;gap:4px}
  .detail-field.full{grid-column:1/-1}
  .detail-field label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);font-weight:700}
  .detail-field textarea,.detail-field input{background:var(--bg4);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12.5px;padding:10px;resize:none;outline:none;font-family:inherit;line-height:1.65;min-height:72px;overflow:hidden}
  .detail-field textarea:focus,.detail-field input:focus{border-color:var(--accent2);background:var(--bg3)}
  .detail-field .read-only{color:var(--text2);font-size:12.5px;line-height:1.65;padding:10px;background:var(--bg4);border-radius:5px;border:1px solid var(--border2)}

  /* EMPTY */
  .empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
  .empty-state h3{font-size:15px;color:var(--text2);margin-bottom:6px}
  .empty-state p{font-size:13px}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:24px;width:100%;max-width:500px}
  .modal h2{font-size:15px;font-weight:600;margin-bottom:16px}
  .modal-field{margin-bottom:12px}
  .modal-field label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
  .modal-field input,.modal-field select,.modal-field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:8px 10px;outline:none;font-family:inherit}
  .modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--accent3)}
  .modal-field textarea{resize:vertical;min-height:70px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  .btn-cancel{padding:8px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:12px;cursor:pointer}
  .btn-cancel:hover{background:var(--bg4)}
  .btn-confirm{padding:8px 16px;background:var(--accent3);border:none;border-radius:6px;color:#fff;font-size:12px;cursor:pointer}
  .btn-confirm:hover{background:var(--accent)}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

  /* PROGRESS BAR */
  .progress-wrap{background:var(--bg3);border-radius:3px;height:4px;overflow:hidden;margin-top:4px}
  .progress-bar{height:100%;background:var(--accent3);transition:width .3s;border-radius:3px}
  .progress-bar.good{background:var(--pass)}
  
  .proj-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:6px}
  .proj-header label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:0;cursor:pointer}
  .proj-header .chevron{font-size:12px;color:var(--text3);transition:transform 0.2s;}
  .proj-header.closed .chevron{transform:rotate(-90deg);}
  #project-list-container{display:block;}
  #project-list-container.hidden{display:none;}
  
  /* INLINE STATUS BUTTONS */
  .inline-status{display:flex;gap:5px;}
  .btn-stat{border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;font-weight:600;}
  .btn-stat:hover{background:var(--bg4);color:var(--text);}
  .btn-stat.Pass.active{background:rgba(16,185,129,.15);border-color:var(--pass);color:#34d399;}
  .btn-stat.Fail.active{background:rgba(240,82,82,.15);border-color:var(--fail);color:#f87171;}
  .btn-stat.NA.active{background:rgba(100,116,139,.15);border-color:var(--na);color:#94a3b8;}
  
  /* EDITABLE INPUTS */
  .item-title-input{background:transparent;border:1px solid transparent;color:var(--text);font-size:13px;font-weight:600;width:100%;margin-bottom:0;line-height:1.4;outline:none;box-sizing:border-box;}
  .item-title-input:hover{border-color:var(--border2);background:var(--bg3);border-radius:4px;}
  .item-title-input:focus{border-color:var(--accent3);background:var(--bg3);border-radius:4px;}
  
  .sev-select{appearance:none;background:transparent;border:1px solid transparent;font-size:10.5px;padding:3px 20px 3px 9px;border-radius:4px;font-weight:700;letter-spacing:.3px;cursor:pointer;outline:none;}
  .sev-select:hover{opacity:0.8;}
  .sev-select-wrap{position:relative;display:inline-block;}
  .sev-select-wrap::after{content:'▼';font-size:8px;position:absolute;right:6px;top:50%;transform:translateY(-50%);pointer-events:none;}
</style>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-logo">
    <h1>&#x1F512; SecList</h1>
    <p>Security Testing Toolkit</p>
  </div>
  <div id="project-section">
    <div class="proj-header" onclick="toggleProjects()">
      <label>Projects</label>
      <span class="chevron" id="proj-chevron">&#x25BE;</span>
    </div>
    <div id="project-list-container">
      <ul id="project-list"></ul>
      <button class="btn-new-proj" onclick="openNewProjectModal()">+ New Project</button>
    </div>
  </div>
  <div id="sidebar-stats">
    <label>Progress</label>
    <div class="stat-row"><span>Total Items</span><span id="stat-total">0</span></div>
    <div class="stat-row"><span>Pass</span><span id="stat-pass" style="color:var(--pass)">0</span></div>
    <div class="stat-row"><span>Fail</span><span id="stat-fail" style="color:var(--crit)">0</span></div>
    <div class="stat-row"><span>N/A</span><span id="stat-na" style="color:var(--na)">0</span></div>
    <div class="stat-row"><span>Pending</span><span id="stat-pending" style="color:var(--text3)">0</span></div>
    <div class="progress-wrap" style="margin-top:8px">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div style="font-size:10px;color:var(--text3);margin-top:4px;text-align:right" id="progress-pct">0% complete</div>
  </div>
  <div id="sidebar-actions">
    <button class="sidebar-btn" onclick="openExportModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export Report
    </button>
    <button class="sidebar-btn" onclick="importFile()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import Progress
    </button>
    <button class="sidebar-btn" style="color:var(--fail)" onclick="resetProgress()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></svg>
      Reset Progress
    </button>
    <input type="file" id="import-file" accept=".html,.xlsx" style="display:none" onchange="handleImport(event)">
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <input id="proj-name-input" placeholder="Project Name" value="" oninput="renameProject(this.value)">
      <span style="font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:4px" id="autosave-badge">Saved</span>
    </div>
    <div class="topbar-right">
      <button class="btn-ghost" onclick="openAddItemModal()">+ Add Custom Item</button>
      <button class="btn-primary" onclick="openExportModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export Report
      </button>
    </div>
  </div>

  <div id="tab-bar">
    <button class="tab active" data-tab="Web" onclick="switchTab('Web')">&#x1F310; Web <span class="tab-badge" id="badge-Web">0</span></button>
    <button class="tab" data-tab="API" onclick="switchTab('API')">&#x1F50C; API <span class="tab-badge" id="badge-API">0</span></button>
    <button class="tab" data-tab="Android" onclick="switchTab('Android')">&#x1F4F1; Android <span class="tab-badge" id="badge-Android">0</span></button>
    <button class="tab" data-tab="iOS" onclick="switchTab('iOS')">&#xF8FF; iOS <span class="tab-badge" id="badge-iOS">0</span></button>
  </div>

  <div id="filter-bar">
    <span class="filter-label">Severity:</span>
    <div class="filter-group" id="sev-filters">
      <button class="filter-btn all active" onclick="toggleFilter('sev','all',this)">All</button>
      <button class="filter-btn Critical" onclick="toggleFilter('sev','Critical',this)">Critical</button>
      <button class="filter-btn High" onclick="toggleFilter('sev','High',this)">High</button>
      <button class="filter-btn Medium" onclick="toggleFilter('sev','Medium',this)">Medium</button>
      <button class="filter-btn Low" onclick="toggleFilter('sev','Low',this)">Low</button>
      <button class="filter-btn Informational" onclick="toggleFilter('sev','Informational',this)">Info</button>
    </div>
    <span class="filter-label" style="margin-left:10px">Status:</span>
    <div class="filter-group" id="stat-filters">
      <button class="filter-btn all active" onclick="toggleFilter('stat','all',this)">All</button>
      <button class="filter-btn Pass" onclick="toggleFilter('stat','Pass',this)">Pass</button>
      <button class="filter-btn Fail" onclick="toggleFilter('stat','Fail',this)">Fail</button>
      <button class="filter-btn NA" onclick="toggleFilter('stat','NA',this)">N/A</button>
      <button class="filter-btn" style="" onclick="toggleFilter('stat','Pending',this)">Pending</button>
    </div>
    <input type="text" id="search-box" placeholder="&#x1F50D; Search..." oninput="handleSearch()">
  </div>

  <div id="content">
    <div class="empty-state">
      <h3>No project selected</h3>
      <p>Create or select a project to get started</p>
    </div>
  </div>
</div>

<!-- MODALS -->
<div id="modal-new-project" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>New Project</h2>
    <div class="modal-field">
      <label>Project Name</label>
      <input id="new-proj-name" placeholder="e.g. ACME Corp Web App Assessment" onkeydown="if(event.key==='Enter')confirmNewProject()">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-new-project')">Cancel</button>
      <button class="btn-confirm" onclick="confirmNewProject()">Create Project</button>
    </div>
  </div>
</div>

<div id="modal-add-item" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>Add Custom Checklist Item</h2>
    <div class="modal-field">
      <label>Title</label>
      <input id="custom-title" placeholder="Vulnerability / Test name">
    </div>
    <div class="modal-field">
      <label>Severity</label>
      <select id="custom-sev">
        <option>Critical</option>
        <option>High</option>
        <option selected>Medium</option>
        <option>Low</option>
        <option>Informational</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Category</label>
      <input id="custom-cat" placeholder="e.g. Authentication, Data Storage">
    </div>
    <div class="modal-field">
      <label>Description</label>
      <textarea id="custom-desc" placeholder="What is the issue?"></textarea>
    </div>
    <div class="modal-field">
      <label>Risk</label>
      <textarea id="custom-risk" placeholder="Impact / Risk"></textarea>
    </div>
    <div class="modal-field">
      <label>Recommendation</label>
      <textarea id="custom-rec" placeholder="How to fix it?"></textarea>
    </div>

      {"id":"and_2","num":"2","title":"Debuggable Flag Enabled","sev":"High","status":"Pending","desc":"The android:debuggable=true flag is set in AndroidManifest.xml, allowing ADB debug access to the app process.\n\nSteps to Test:\n1. Run: apktool d app.apk -o out/\n2. Open out/AndroidManifest.xml\n3. Check <application android:debuggable='true'>\n4. Alternatively run: adb shell run-as <pkg> ls /data/data/<pkg>/","risk":"Attacker with USB access uses adb to attach a debugger, read memory, extract decrypted data, and step through security-sensitive code.","rec":"Ensure android:debuggable is not set or set to false in the release manifest. ProGuard/R8 strips it automatically for release builds.","remarks":""},
      {"id":"and_3","num":"3","title":"Backup Allowed for App Data","sev":"High","status":"Pending","desc":"android:allowBackup=true permits adb backup to extract app data including databases and SharedPreferences without root.\n\nSteps to Test:\n1. Check AndroidManifest.xml for android:allowBackup\n2. Run: adb backup -noapk <pkg>\n3. Extract: java -jar abe.jar unpack backup.ab backup.tar\n4. Inspect extracted /apps/<pkg>/ for sensitive data","risk":"Attacker with physical USB access extracts tokens, session data, and cached user information without needing root access.","rec":"Set android:allowBackup=false or use android:fullBackupContent rules to exclude sensitive files from backup.","remarks":""},
      {"id":"and_4","num":"4","title":"Cleartext HTTP Traffic Allowed","sev":"High","status":"Pending","desc":"App allows unencrypted HTTP traffic either via android:usesCleartextTraffic=true or permissive network_security_config.xml.\n\nSteps to Test:\n1. Check AndroidManifest.xml for usesCleartextTraffic\n2. Check res/xml/network_security_config.xml for cleartextTrafficPermitted\n3. Run app through Burp and look for http:// requests\n4. Run: adb shell tcpdump -i any -w /sdcard/cap.pcap","risk":"Credentials, tokens, and sensitive data transmitted over HTTP can be intercepted by any attacker on the same network.","rec":"Set android:usesCleartextTraffic=false. Ensure all API endpoints use HTTPS. Use network_security_config.xml to enforce HTTPS per-domain.","remarks":""},
      {"id":"and_5","num":"5","title":"Dangerous / Unnecessary Permissions","sev":"Medium","status":"Pending","desc":"App requests sensitive permissions (READ_CONTACTS, ACCESS_FINE_LOCATION, READ_SMS, CAMERA) that are not required for its functionality.\n\nSteps to Test:\n1. Check AndroidManifest.xml <uses-permission> entries\n2. Compare listed permissions against app features\n3. Run: aapt dump permissions app.apk\n4. Test on device — revoke permissions and see which features break","risk":"Over-privileged apps present larger attack surface. If compromised, attacker can access contacts, location, SMS, and camera.","rec":"Request only permissions essential to core functionality. Use runtime permissions. Justify each permission in your privacy policy.","remarks":""},
      {"id":"and_6","num":"6","title":"Exported Components Without Permission","sev":"High","status":"Pending","desc":"Activities, Services, or BroadcastReceivers are exported (android:exported=true) without requiring any permission, allowing external apps to invoke them.\n\nSteps to Test:\n1. Parse AndroidManifest.xml for exported components\n2. Run: adb shell am start -n <pkg>/<activity>\n3. Try: adb shell am broadcast -a <action> -n <pkg>/<receiver>\n4. Check if sensitive screens open without authentication","risk":"Attacker app or adb command launches internal activities, invokes services, or sends broadcasts, bypassing authentication screens.","rec":"Set android:exported=false for all components not intentionally public. Add android:permission to restrict access to exported components.","remarks":""},
      {"id":"and_7","num":"7","title":"Weak APK Signing Algorithm","sev":"High","status":"Pending","desc":"APK is signed using the deprecated v1 signing scheme only (JAR signing), or uses MD5/SHA1 in the signing certificate.\n\nSteps to Test:\n1. Run: apksigner verify --verbose app.apk\n2. Check if only v1 signature is present (no v2 or v3)\n3. Run: keytool -printcert -jarfile app.apk\n4. Check signature algorithm for MD5withRSA or SHA1withRSA","risk":"v1-only signed APKs are vulnerable to Janus attack (CVE-2017-13156) on Android 5-8 allowing code injection without signature invalidation.","rec":"Sign APKs with v2 and v3 signing schemes. Use SHA256withRSA or SHA256withECDSA. Avoid MD5 and SHA1 signing algorithms.","remarks":""},
      {"id":"and_8","num":"8","title":"Missing or Partial Code Obfuscation","sev":"Medium","status":"Pending","desc":"Release APK contains readable class names, method names, and string constants making reverse engineering trivial.\n\nSteps to Test:\n1. Decompile: jadx -d out/ app.apk\n2. Browse out/sources/ — if class names are meaningful (UserRepository, PaymentManager) → no obfuscation\n3. Check proguard-rules.pro for keep rules that over-expose classes\n4. Run MobSF scan and check obfuscation score","risk":"Attacker reads business logic, discovers API endpoints, finds hardcoded values, and identifies security checks to bypass.","rec":"Enable R8/ProGuard in release builds. Minimize keep rules. Apply string obfuscation for sensitive string constants.","remarks":""}
    ]
  },
  {
    "cat": "Cryptography",
    "items": [
      {"id":"and_9","num":"9","title":"Hardcoded Secrets in APK","sev":"Critical","status":"Pending","desc":"API keys, passwords, tokens, or encryption keys are written directly in source code, strings.xml, or config files inside the APK.\n\nSteps to Test:\n1. Decompile: jadx -d out/ app.apk\n2. Search: grep -ri 'key|secret|password|token|api' out/resources/\n3. Search source: grep -ri 'apikey|secret|password|privatekey' out/sources/\n4. Check BuildConfig.java and Constants.java\n5. Check assets/ and res/raw/ folders\n6. Run MobSF automated scan","risk":"Any person who downloads the APK can extract these secrets in minutes with jadx. Exposed keys enable backend API abuse, auth bypass, or cloud access.","rec":"Never hardcode secrets in the APK. Retrieve secrets at runtime from a secure backend. Use Android Keystore for on-device keys.","remarks":""},
      {"id":"and_10","num":"10","title":"Weak Cryptographic Algorithm","sev":"High","status":"Pending","desc":"App uses outdated or broken algorithms such as MD5, SHA1, DES, or 3DES for security-sensitive cryptographic operations.\n\nSteps to Test:\n1. Search decompiled code: grep -ri 'MD5|SHA1|DES|RC4|Blowfish' out/sources/\n2. Check MessageDigest.getInstance() and Cipher.getInstance() calls\n3. Run MobSF and check crypto findings\n4. Look for insecure hash usage in password storage or token generation","risk":"MD5 and SHA1 have known collision attacks. DES has 56-bit keys brute-forceable in hours. Use of these algorithms may allow decryption of sensitive data.","rec":"Use AES-256-GCM for encryption. Use SHA-256 or SHA-512 for hashing. Use BCrypt or Argon2 for password hashing.","remarks":""},
      {"id":"and_11","num":"11","title":"AES in ECB Mode","sev":"High","status":"Pending","desc":"App uses AES encryption with ECB (Electronic Codebook) mode which produces identical ciphertext for identical plaintext blocks.\n\nSteps to Test:\n1. Search: grep -ri 'AES/ECB|AES\\/ECB' out/sources/\n2. Look for Cipher.getInstance('AES') without mode — defaults to ECB on Android\n3. Capture encrypted payloads and check for repeated patterns","risk":"ECB mode does not provide semantic security. Patterns in plaintext are visible in ciphertext. Attacker can identify and replay blocks.","rec":"Use AES/GCM/NoPadding for authenticated encryption. Never use ECB mode for any security-sensitive operation.","remarks":""},
      {"id":"and_12","num":"12","title":"Static IV or Static Salt","sev":"High","status":"Pending","desc":"Initialization Vector (IV) or salt value is hardcoded or reused across encryptions, weakening the cipher.\n\nSteps to Test:\n1. Search: grep -ri 'IvParameterSpec\\|SecretKeySpec' out/sources/\n2. Check if IV is a fixed byte array literal\n3. Check if salt is hardcoded string passed to key derivation\n4. Test by encrypting same plaintext twice — if ciphertext matches, IV is static","risk":"Static IV with CBC mode allows pattern analysis. Static salt in key derivation defeats the purpose of salting and enables precomputed attacks.","rec":"Generate a cryptographically random IV for each encryption using SecureRandom. Generate random salt for each key derivation. Store IV/salt alongside ciphertext.","remarks":""},
      {"id":"and_13","num":"13","title":"Weak Random Number Generator","sev":"High","status":"Pending","desc":"App uses java.util.Random or Math.random() for security-sensitive random value generation (tokens, OTPs, keys).\n\nSteps to Test:\n1. Search: grep -ri 'new Random()\\|Math.random()' out/sources/\n2. Check usage context — if used for token/OTP/key generation → critical finding\n3. On Android < 4.4, check for broken SecureRandom implementations","risk":"java.util.Random is a pseudo-random generator predictable with known seed. Attacker predicts generated tokens, OTPs, or session IDs.","rec":"Use java.security.SecureRandom for all security-sensitive random value generation. Never seed SecureRandom manually.","remarks":""},
      {"id":"and_14","num":"14","title":"Keys Not in Android Keystore","sev":"High","status":"Pending","desc":"Cryptographic keys are stored in SharedPreferences, files, or hardcoded in code instead of the hardware-backed Android Keystore.\n\nSteps to Test:\n1. Search for KeyStore.getInstance() usage — if absent, keys not in Keystore\n2. Check if keys are stored as base64 strings in SharedPreferences\n3. Check if keys are derived from static passwords\n4. On rooted device: try to extract SharedPreferences and find key material","risk":"Keys stored in files or SharedPreferences are extractable on rooted devices. Android Keystore keys are hardware-protected and cannot be exported.","rec":"Generate and store all cryptographic keys in Android Keystore using KeyPairGenerator or KeyGenerator with KeyGenParameterSpec.","remarks":""}
    ]
  },
  {
    "cat": "Secure Coding",
    "items": [
      {"id":"and_15","num":"15","title":"printStackTrace() in Production","sev":"Low","status":"Pending","desc":"App uses e.printStackTrace() or System.out.println() for error handling, which prints stack traces to Android logcat.\n\nSteps to Test:\n1. Search: grep -ri 'printStackTrace|System.out.print' out/sources/\n2. Run app: adb logcat | grep -i 'error|exception'\n3. Trigger error conditions (wrong password, bad network) and monitor output","risk":"Stack traces reveal internal class structure, file paths, and logic flow. Via adb logcat, attackers map the app internals for targeted attacks.","rec":"Remove all printStackTrace() from release builds. Use a logging framework (Timber) with log-level control. Disable verbose logging in production.","remarks":""},
      {"id":"and_16","num":"16","title":"Dynamic Code Loading Risk","sev":"High","status":"Pending","desc":"App loads DEX files, JARs, or APKs at runtime from external storage or untrusted sources using DexClassLoader.\n\nSteps to Test:\n1. Search: grep -ri 'DexClassLoader\\|PathClassLoader\\|loadClass' out/sources/\n2. Check the source path parameter — is it from external storage or network?\n3. Check if loaded files are signature-verified before execution\n4. Try replacing the DEX file with a malicious one on external storage","risk":"Attacker replaces the dynamically loaded code file with malicious code that executes with the app's permissions.","rec":"Avoid loading code from external sources. If required, sign and verify dynamically loaded code. Load only from internal app storage.","remarks":""},
      {"id":"and_17","num":"17","title":"PendingIntent Misconfiguration","sev":"Medium","status":"Pending","desc":"PendingIntents are created with implicit intents or missing FLAG_IMMUTABLE/FLAG_UPDATE_CURRENT flags, allowing hijacking by other apps.\n\nSteps to Test:\n1. Search: grep -ri 'PendingIntent' out/sources/\n2. Check if base intent is explicit (has component set) or implicit\n3. Check flags: missing FLAG_IMMUTABLE on Android 12+ is a warning\n4. Try intercepting the PendingIntent from a test malicious app","risk":"Malicious app intercepts the PendingIntent and modifies its extras or replaces the target, enabling privilege escalation or data theft.","rec":"Always use explicit intents in PendingIntent. Use FLAG_IMMUTABLE for PendingIntents that should not be modified. Use FLAG_MUTABLE only when mutation is required.","remarks":""},
      {"id":"and_18","num":"18","title":"Firebase / API Keys Exposed","sev":"Critical","status":"Pending","desc":"Firebase API keys, google-services.json credentials, or other cloud API keys are present in the APK without server-side restrictions.\n\nSteps to Test:\n1. Extract: unzip app.apk assets/google-services.json\n2. Check google-services.json for api_key values\n3. Search: grep -ri 'firebase\\|AAAA\\|AIza' out/resources/\n4. Test Firebase key: curl 'https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=<key>'\n5. Check if Firebase rules allow unauthenticated read/write","risk":"Exposed Firebase keys with permissive security rules allow unauthenticated access to the entire database and storage.","rec":"Restrict Firebase API key usage to your app's SHA fingerprint and bundle ID in Firebase Console. Enforce Firebase Security Rules. Never commit google-services.json to public repos.","remarks":""}
    ]
  },
  {
    "cat": "Data Storage",
    "items": [
      {"id":"and_19","num":"19","title":"Sensitive Data in SharedPreferences (Plaintext)","sev":"High","status":"Pending","desc":"App stores tokens, passwords, or PII in SharedPreferences as plaintext XML files accessible on rooted devices.\n\nSteps to Test:\n1. Install app on rooted device or emulator\n2. Log in / perform sensitive action\n3. Run: adb shell su -c 'cat /data/data/<pkg>/shared_prefs/*.xml'\n4. Check content for tokens, passwords, user data\n5. Also pull backup: adb backup -noapk <pkg>","risk":"Attacker with physical access or ADB extracts SharedPreferences XML files and reads tokens or credentials without any decryption.","rec":"Use EncryptedSharedPreferences from Jetpack Security library. Never store passwords or session tokens in plaintext SharedPreferences.","remarks":""},
      {"id":"and_20","num":"20","title":"Sensitive Data in SQLite Database","sev":"High","status":"Pending","desc":"Local SQLite database stores sensitive user data, tokens, or PII in cleartext tables without encryption.\n\nSteps to Test:\n1. On rooted device: adb shell su -c 'ls /data/data/<pkg>/databases/'\n2. Pull: adb pull /data/data/<pkg>/databases/<db>.db\n3. Open with DB Browser for SQLite\n4. Check tables for sensitive columns (password, token, ssn, card_number)","risk":"Attacker with rooted access or device backup extracts database and reads all stored sensitive records.","rec":"Encrypt database using SQLCipher. Or encrypt individual sensitive columns before storage. Apply Android Data Protection API to database files.","remarks":""},
      {"id":"and_21","num":"21","title":"Sensitive Data on External Storage","sev":"High","status":"Pending","desc":"App writes sensitive files (tokens, user data, logs) to external storage (SD card or /sdcard/) accessible by any app with READ_EXTERNAL_STORAGE permission.\n\nSteps to Test:\n1. Search: grep -ri 'getExternalStorage\\|Environment.getExternalFilesDir' out/sources/\n2. Monitor file writes: adb shell inotifywait -m /sdcard/ during app operation\n3. Check /sdcard/ for app-related files after performing sensitive actions","risk":"Any installed app with READ_EXTERNAL_STORAGE permission can read files from external storage, exposing sensitive data to other apps.","rec":"Store all sensitive files in internal storage (getFilesDir(), getDataDir()). Never write tokens, credentials, or PII to external storage.","remarks":""},
      {"id":"and_22","num":"22","title":"Sensitive Data in Android Logcat","sev":"Medium","status":"Pending","desc":"App logs sensitive information such as tokens, passwords, PII, or API responses to Android logcat.\n\nSteps to Test:\n1. Connect device and run: adb logcat | grep -i '<pkg>'\n2. Perform login, payment, and sensitive operations\n3. Monitor logcat for tokens, passwords, card numbers\n4. Search source: grep -ri 'Log\\.d\\|Log\\.v\\|Log\\.i\\|Log\\.e' out/sources/ | grep -i 'token\\|pass\\|key'","risk":"Any app with READ_LOGS permission (or on pre-4.1 Android) reads sensitive data from logcat. Developer-only logs often leak to production builds.","rec":"Strip all sensitive data from log statements. Use ProGuard to remove Log calls in release builds. Never log tokens, passwords, or PII.","remarks":""},
      {"id":"and_23","num":"23","title":"Sensitive Data Copied to Clipboard","sev":"Medium","status":"Pending","desc":"App allows passwords, OTPs, card numbers, or tokens to be copied to the system clipboard accessible by other apps.\n\nSteps to Test:\n1. In app, long-press on password or token field — check if Copy option appears\n2. Copy the value, then: adb shell service call clipboard 2\n3. Check if sensitive value is in clipboard\n4. Install a clipboard monitor app and verify it captures the data","risk":"Malicious apps or keyboard apps with clipboard access read sensitive data copied by the user.","rec":"Set android:textIsSelectable=false on password fields. Use TYPE_TEXT_VARIATION_PASSWORD. Clear clipboard after sensitive operations.","remarks":""},
      {"id":"and_24","num":"24","title":"Sensitive Data Visible in App Switcher","sev":"Medium","status":"Pending","desc":"App does not set the secure flag or blur the screen when backgrounded, causing screenshots of sensitive screens to appear in the app switcher.\n\nSteps to Test:\n1. Navigate to a screen with sensitive data (account balance, messages)\n2. Press the Home/Recents button\n3. Check the app thumbnail in the recent apps list\n4. Also check /data/system/recent_images/ on rooted device","risk":"Physical attacker or malicious app using OBSERVE_SCREEN permission can see sensitive data through the recent apps thumbnail.","rec":"Add getWindow().setFlags(WindowManager.LayoutParams.FLAG_SECURE) in Activity.onCreate() for sensitive screens.","remarks":""},
      {"id":"and_25","num":"25","title":"Sensitive Data in App Cache","sev":"Medium","status":"Pending","desc":"App caches API responses, images, or documents containing sensitive data in the app cache directory without encryption.\n\nSteps to Test:\n1. Perform sensitive operations (view statements, messages)\n2. On rooted device: adb shell su -c 'ls /data/data/<pkg>/cache/'\n3. Pull and inspect cache files: adb pull /data/data/<pkg>/cache/\n4. Check for readable JSON responses, images with PII","risk":"Cached sensitive data persists after logout and can be extracted on rooted devices or via backup.","rec":"Disable HTTP response caching for sensitive API calls. Clear cache on logout. Encrypt cached files for any data that must be cached.","remarks":""},
      {"id":"and_26","num":"26","title":"Sensitive Data in App Memory","sev":"Medium","status":"Pending","desc":"Passwords, encryption keys, or sensitive strings remain in heap memory longer than necessary and are recoverable via memory dump.\n\nSteps to Test:\n1. Enter password in app\n2. On rooted device: adb shell su -c 'cat /proc/<pid>/mem' or use Fridump\n3. Run: python fridump.py -u -s <pid>\n4. Search dump: strings dump.bin | grep -i 'password\\|token'","risk":"Attacker with root access dumps app memory and recovers plaintext passwords, keys, and tokens from heap.","rec":"Use char[] instead of String for passwords (char arrays can be zeroed). Zero out sensitive arrays after use. Minimize time sensitive data lives in memory.","remarks":""}
    ]
  },
  {
    "cat": "Network Security",
    "items": [
      {"id":"and_27","num":"27","title":"No SSL Certificate Pinning","sev":"Critical","status":"Pending","desc":"App accepts any certificate signed by a trusted CA, allowing a proxy to intercept and view all HTTPS traffic.\n\nSteps to Test:\n1. Install Burp Suite CA cert on test device\n2. Configure device proxy → Burp Suite IP:8080\n3. Browse the app and check if traffic appears in Burp Suite HTTP History\n4. If API calls are visible in plaintext → no pinning\n5. Verify by modifying a request and checking if app accepts tampered response","risk":"Attacker on the same network performs MitM attack and intercepts all API calls including credentials, tokens, and sensitive data in transit.","rec":"Implement SSL/TLS certificate pinning using OkHttp CertificatePinner or network_security_config.xml pin-set. Pin the public key hash of your server certificate.","remarks":""},
      {"id":"and_28","num":"28","title":"SSL Pinning Bypass","sev":"Critical","status":"Pending","desc":"Implemented certificate pinning can be bypassed using Frida, Objection, or SSL Kill Switch tools on rooted devices.\n\nSteps to Test:\n1. Confirm pinning is in place (Burp fails without bypass)\n2. Run: objection -g <pkg> explore → android sslpinning disable\n3. Try: frida -U -f <pkg> -l pinning-bypass.js\n4. Try Apk-Mitm tool to patch pinning statically\n5. If Burp intercepts after bypass → implementation defeated","risk":"Attacker on rooted device bypasses pinning to intercept and tamper with all API traffic including authenticated requests.","rec":"Add anti-root and anti-debugging checks alongside pinning. Use multi-layer pinning (OkHttp + network_security_config). Detect Frida presence at runtime.","remarks":""},
      {"id":"and_29","num":"29","title":"Weak TLS Version or Cipher Suite","sev":"High","status":"Pending","desc":"App or server accepts TLS 1.0 / 1.1 connections or weak cipher suites (RC4, NULL, EXPORT, DES, 3DES).\n\nSteps to Test:\n1. Run testssl.sh against API server: ./testssl.sh --protocols api.example.com\n2. Check for TLS 1.0/1.1 support: POODLE, BEAST vulnerabilities\n3. Run: nmap --script ssl-enum-ciphers -p 443 api.example.com\n4. Verify app rejects connections on forced TLS 1.0 via proxy settings","risk":"Downgrade attacks force TLS 1.0 connections vulnerable to POODLE and BEAST. Weak ciphers allow decryption of captured traffic.","rec":"Enforce TLS 1.2 minimum (TLS 1.3 preferred). Disable all weak cipher suites. Use SSLContext with TLSv1.2 or TLSv1.3 protocol specification.","remarks":""},
      {"id":"and_30","num":"30","title":"Improper Certificate Validation","sev":"High","status":"Pending","desc":"App implements a custom TrustManager or HostnameVerifier that accepts any certificate or any hostname.\n\nSteps to Test:\n1. Search: grep -ri 'TrustManager\\|checkServerTrusted\\|ALLOW_ALL_HOSTNAME' out/sources/\n2. Check if checkServerTrusted() has empty body (accepts all certs)\n3. Check for ALLOW_ALL_HOSTNAME_VERIFIER usage\n4. Test with self-signed cert in Burp — if accepted → broken validation","risk":"App accepts any certificate including self-signed and expired ones. Attacker performs MitM with any certificate without needing CA trust.","rec":"Remove all custom TrustManager and HostnameVerifier implementations. Use the default Android TLS validation.","remarks":""},
      {"id":"and_31","num":"31","title":"Sensitive Data in API Response (Unmasked)","sev":"High","status":"Pending","desc":"API responses return full sensitive values (card numbers, SSN, passwords, tokens) that should be masked or omitted.\n\nSteps to Test:\n1. Intercept all API responses with Burp Suite\n2. Look for full credit card numbers, CVV, SSN, passwords, private keys\n3. Check profile/account APIs for over-exposure of PII\n4. Check if data needed only for display is returned in full rather than masked","risk":"Exposed sensitive data in transit or logs can be captured. Over-exposure in API responses enables data harvesting.","rec":"Mask sensitive fields server-side (e.g., card number as ****1234). Return only data the client needs. Apply field-level response filtering.","remarks":""}
    ]
  },
  {
    "cat": "Authentication & Session",
    "items": [
      {"id":"and_32","num":"32","title":"Session Token Not Invalidated on Logout","sev":"High","status":"Pending","desc":"After logout, the old session token continues to be accepted by the server for API calls.\n\nSteps to Test:\n1. Log in and capture session token from Authorization header in Burp Suite\n2. Log out through the app\n3. Replay the old token using Burp Suite Repeater\n4. If server returns valid data → session not properly invalidated","risk":"Attacker who steals a session token can continue using it indefinitely even after the victim has logged out.","rec":"Invalidate tokens server-side on logout. Maintain a server-side token blacklist or use short-lived tokens with refresh token rotation.","remarks":""},
      {"id":"and_33","num":"33","title":"OTP / PIN Brute Force Possible","sev":"Critical","status":"Pending","desc":"OTP or PIN verification endpoint does not enforce rate limiting or lockout, allowing unlimited guessing attempts.\n\nSteps to Test:\n1. Capture OTP verification request in Burp Suite\n2. Send to Intruder and run number sequence from 0000 to 9999\n3. Check if any attempt returns HTTP 200 (success)\n4. Monitor for any lockout or CAPTCHA after multiple failures","risk":"Attacker brute-forces 4-digit OTP (10,000 combinations) in seconds via automated requests, gaining account takeover.","rec":"Enforce rate limiting (max 5 OTP attempts). Implement account lockout after failed attempts. Use OTPs with short expiry (60-120 seconds). Add CAPTCHA for repeated failures.","remarks":""},
      {"id":"and_34","num":"34","title":"Weak JWT Configuration","sev":"Critical","status":"Pending","desc":"JWT tokens use weak algorithms (alg:none, HS256 with weak secret), or do not validate expiry and audience claims.\n\nSteps to Test:\n1. Capture JWT from Authorization header\n2. Decode at jwt.io — check alg field\n3. If HS256: try known weak secrets with hashcat or jwt_tool\n4. Modify alg to 'none' and remove signature — test if server accepts\n5. Check if exp claim is validated by replaying expired token","risk":"Forged or expired JWTs grant unauthorized access. Weak HMAC secrets enable JWT forgery without private key.","rec":"Use RS256 with 2048-bit RSA keys. Validate alg, exp, iss, aud claims server-side. Reject alg:none tokens. Use strong random HMAC secrets (256-bit minimum).","remarks":""},
      {"id":"and_35","num":"35","title":"Session Timeout Missing","sev":"Medium","status":"Pending","desc":"App does not implement session timeout, keeping sessions active indefinitely without user re-authentication.\n\nSteps to Test:\n1. Log in and capture session token\n2. Leave session idle for 30+ minutes\n3. Replay the token in Burp Suite\n4. If still valid → no timeout\n5. Check if background mode kills session","risk":"Stolen session token remains valid indefinitely. Physical device access allows long-term account access without re-authentication.","rec":"Implement server-side session timeout (15-30 minutes of inactivity for sensitive apps). Force re-authentication for sensitive operations after timeout.","remarks":""},
      {"id":"and_36","num":"36","title":"Account Lockout Missing","sev":"High","status":"Pending","desc":"Login endpoint does not lock the account or implement progressive delays after multiple failed authentication attempts.\n\nSteps to Test:\n1. Capture login request in Burp Suite\n2. Run Intruder with password list against known username\n3. Monitor if any requests are blocked or delayed after N failures\n4. Check for lockout email/notification being triggered","risk":"Attacker performs credential stuffing or password spraying attacks without any account protection mechanism.","rec":"Lock account for 15-30 minutes after 5-10 failed attempts. Send lockout notification email. Implement CAPTCHA after 3 failures. Log and alert on brute force patterns.","remarks":""},
      {"id":"and_37","num":"37","title":"Weak Password Policy","sev":"Medium","status":"Pending","desc":"App accepts very short or simple passwords (e.g., '1234', 'password') without enforcing complexity requirements.\n\nSteps to Test:\n1. During registration, try setting password: '1234', 'password', 'a'\n2. Check if any are accepted by the server\n3. Try changing password to a single character\n4. Review password policy documentation vs actual enforcement","risk":"Weak passwords are easily guessed or brute-forced. Credential stuffing with common password lists succeeds more often.","rec":"Enforce minimum 8 characters with complexity (uppercase, lowercase, number, symbol). Check against known breached password lists (HaveIBeenPwned API).","remarks":""}
    ]
  },
  {
    "cat": "Runtime & Anti-Tampering",
    "items": [
      {"id":"and_38","num":"38","title":"Root Detection Missing or Bypassable","sev":"High","status":"Pending","desc":"App does not detect rooted devices, or its root detection is trivially bypassed, allowing deeper analysis on a rooted environment.\n\nSteps to Test:\n1. Install app on rooted device (Magisk)\n2. Check if app runs normally → detection missing\n3. If detected: objection -g <pkg> explore → android root disable\n4. Try Magisk DenyList or Shamiko module\n5. Use Frida to hook and return false on root check method","risk":"On rooted devices, attacker reads app memory, modifies runtime behavior, extracts keys from Keystore, and hooks any function using Frida.","rec":"Multi-layered root detection: check su binary, Magisk files, build tags, test-keys signature. Use Google Play Integrity API as the strongest attestation signal.","remarks":""},
      {"id":"and_39","num":"39","title":"Emulator Detection Missing or Bypassable","sev":"Medium","status":"Pending","desc":"App runs in Android emulator without detection, enabling automated analysis and scripted attacks.\n\nSteps to Test:\n1. Run app in Android Studio emulator or Genymotion\n2. Check if app runs normally → no emulator detection\n3. If detected, bypass with: frida hook on Build.FINGERPRINT checks\n4. Run automated scripts against emulated instance","risk":"Automated tools run against emulator instances to perform mass analysis, bypass rate limits, or test attacks at scale.","rec":"Check Build.FINGERPRINT, Build.MODEL for emulator signatures. Detect QEMU drivers. Combine with Play Integrity API device attestation.","remarks":""},
      {"id":"and_40","num":"40","title":"APK Tampering Detection Missing","sev":"High","status":"Pending","desc":"App does not verify its own signature at runtime, allowing repackaged or modified APKs to run as legitimate app.\n\nSteps to Test:\n1. Decompile app, add malicious code, repackage and sign with test key\n2. Install modified APK on device\n3. If app runs normally → no integrity check\n4. Check if server validates app signature via any attestation API","risk":"Attacker distributes modified APK with malware that captures credentials while appearing to be the legitimate app.","rec":"Verify app signature at runtime using PackageManager.getSigningInfo(). Use Google Play Integrity API to verify APK integrity from server side.","remarks":""},

// =================== STATE ===================
let state = {
  projects: [],
  activeProject: null,
  activeTab: 'Web',
  sevFilter: 'all',
  statFilter: 'all',
};

function getProj() {
  return state.projects.find(p => p.id === state.activeProject);
}

function loadState() {
  try {
    const s = localStorage.getItem('SecList_state');
    if(s) state = {...state, ...JSON.parse(s)};
    if(!state.projects) state.projects = [];
  } catch(e){}
}

let saveTimer;
function saveState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem('SecList_state', JSON.stringify(state));
    const badge = document.getElementById('autosave-badge');
    if(badge){badge.textContent='Saved ✓';setTimeout(()=>badge.textContent='Saved',1500);}
  }, 400);
}

// =================== PROJECTS ===================
function openNewProjectModal() {
  document.getElementById('new-proj-name').value = '';
  document.getElementById('modal-new-project').style.display = 'flex';
  setTimeout(()=>document.getElementById('new-proj-name').focus(),100);
}

function confirmNewProject() {
  const name = document.getElementById('new-proj-name').value.trim() || 'Untitled Project';
  const id = 'proj_' + Date.now();
  const proj = {
    id, name,
    data: JSON.parse(JSON.stringify(DEFAULT_DATA)),
    created: new Date().toISOString()
  };
  state.projects.push(proj);
  state.activeProject = id;
  closeModal('modal-new-project');
  saveState();
  renderAll();
}

function selectProject(id) {
  state.activeProject = id;
  saveState();
  renderAll();
}

function deleteProject(id) {
  if(!confirm('Delete this project? This cannot be undone.')) return;
  state.projects = state.projects.filter(p=>p.id!==id);
  if(state.activeProject === id) state.activeProject = state.projects[0]?.id || null;
  saveState();
  renderAll();
}

function renameProject(val) {
  const proj = getProj();
  if(proj){ proj.name = val; saveState(); renderProjectList(); }
}

// =================== TABS ===================
function switchTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  renderChecklist();
}

// =================== FILTERS ===================
function toggleFilter(type, val, btn) {
  if(type==='sev') {
    state.sevFilter = val;
    document.querySelectorAll('#sev-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  } else {
    state.statFilter = val;
    document.querySelectorAll('#stat-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  }
  btn.classList.add('active');
  renderChecklist();
}

function resetProgress() {
  const proj = getProj();
  if(!proj) return;
  if(!confirm('Are you sure you want to reset all progress in this project? This will mark all items as Pending.')) return;
  
  Object.values(proj.data).forEach(sections => {
    sections.forEach(sec => {
      sec.items.forEach(item => {
        item.status = 'Pending';
      });
    });
  });
  
  saveState();
  renderAll();
}

function toggleProjects() {
  const container = document.getElementById('project-list-container');
  const header = document.querySelector('.proj-header');
  container.classList.toggle('hidden');
  header.classList.toggle('closed');
}

// =================== RENDER ===================
function renderAll() {
  renderProjectList();
  renderTabBadges();
  renderChecklist();
  renderStats();
  const proj = getProj();
  const inp = document.getElementById('proj-name-input');
  if(inp) inp.value = proj ? proj.name : '';
}

function renderProjectList() {
  const ul = document.getElementById('project-list');
  ul.innerHTML = '';
  state.projects.forEach(p => {
    const li = document.createElement('li');
    li.className = p.id === state.activeProject ? 'active' : '';
    li.innerHTML = `<span>${escHtml(p.name)}</span><span class="proj-del" onclick="event.stopPropagation();deleteProject('${p.id}')">&#x2715;</span>`;
    li.onclick = () => selectProject(p.id);
    ul.appendChild(li);
  });
}

function renderTabBadges() {
  const proj = getProj();
  ['Web','API','Android','iOS'].forEach(tab => {
    const badge = document.getElementById('badge-'+tab);
    if(!badge) return;
    if(!proj){badge.textContent='0';return;}
    let count = 0;
    (proj.data[tab]||[]).forEach(sec=>count+=sec.items.length);
    badge.textContent = count;
  });
}

function renderStats() {
  const proj = getProj();
  let total=0,pass=0,fail=0,na=0;
  if(proj) {
    Object.values(proj.data).forEach(sections=>{
      sections.forEach(sec=>sec.items.forEach(item=>{
        total++;
        if(item.status==='Pass') pass++;
        else if(item.status==='Fail') fail++;
        else if(item.status==='NA') na++;
      }));
    });
  }
  const done = pass+fail+na;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pass').textContent = pass;
  document.getElementById('stat-fail').textContent = fail;
  document.getElementById('stat-na').textContent = na;
  document.getElementById('stat-pending').textContent = total-done;
  const pb = document.getElementById('progress-bar');
  pb.style.width = pct+'%';
  pb.className = 'progress-bar' + (pct>=80?' good':'');
  document.getElementById('progress-pct').textContent = pct+'% complete';
}

function renderChecklist() {
  const content = document.getElementById('content');
  const proj = getProj();
  if(!proj){
    content.innerHTML='<div class="empty-state"><h3>No project selected</h3><p>Create or select a project to get started</p></div>';
    return;
  }
  // Preserve expanded items using persistent set
  const expandedIds = _expandedItems;

  const sections = proj.data[state.activeTab] || [];
  const searchEl = document.getElementById('search-box');
  const search = searchEl ? searchEl.value.toLowerCase().trim() : '';
  let html = '';
  const sevOrder = {'Critical':0,'High':1,'Medium':2,'Low':3,'Informational':4};
  
  sections.forEach((sec, si) => {
    let items = sec.items;
    // Filter
    if(state.sevFilter!=='all') items = items.filter(i=>i.sev===state.sevFilter);
    if(state.statFilter!=='all') {
      if(state.statFilter==='Pending') items = items.filter(i=>i.status==='Pending');
      else items = items.filter(i=>i.status===state.statFilter);
    }
    if(search) items = items.filter(i=>
      (i.title||'').toLowerCase().includes(search)||
      (i.desc||'').toLowerCase().includes(search)||
      (i.cat||'').toLowerCase().includes(search)||
      (i.risk||'').toLowerCase().includes(search)||
      (i.rec||'').toLowerCase().includes(search)
    );
    if(items.length===0) return;

    // Sort by severity
    items = [...items].sort((a,b)=>(sevOrder[a.sev]??9)-(sevOrder[b.sev]??9));
    
    html += `<div class="section-header"><h3>${escHtml(sec.cat)}</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="section-count">${items.length} item${items.length!==1?'s':''}</span>
        <button class="btn-add-item" onclick="openAddItemModal('${si}')">+ Add Item</button>
      </div></div>`;
    
    items.forEach(item => {
      html += renderItem(item, si, expandedIds.has('item-'+item.id));
    });
  });

const _expandedItems = new Set();

function updateSevBadge(id, sev) {
  const itemEl = document.getElementById('item-'+id);
  if(!itemEl) return;
  const sel = itemEl.querySelector('.sev-select');
  if(sel) {
    sel.className = 'sev-badge sev-'+sev+' sev-select';
  }
  // If severity filter is active and this item no longer matches, remove it
  if(state.sevFilter !== 'all' && state.sevFilter !== sev) {
    _expandedItems.delete('item-'+id);
    itemEl.remove();
  }
  renderStats();
  saveState();
}



function toggleItem(id) {
  const el = document.getElementById('item-'+id);
  if(el) {
    el.classList.toggle('expanded');
    if(el.classList.contains('expanded')) {
      _expandedItems.add('item-'+id);
      setTimeout(() => initTextareas(el), 10);
    } else {
      _expandedItems.delete('item-'+id);
    }
  }
}

function setStatus(id, val) {
  const proj = getProj();
  if(!proj) return;
  let newStatus = 'Pending';
  Object.values(proj.data).forEach(sections=>sections.forEach(sec=>sec.items.forEach(item=>{
    if(item.id===id){
      newStatus = item.status === val ? 'Pending' : val;
      item.status = newStatus;
    }
  })));
  // Update buttons in-place — no full re-render needed
  const itemEl = document.getElementById('item-'+id);
  if(itemEl) {
    itemEl.querySelectorAll('.btn-stat').forEach(btn => {
      btn.classList.remove('active');
      if(btn.classList.contains(newStatus)) btn.classList.add('active');
    });
    // Update filter visibility if stat filter is active
    if(state.statFilter !== 'all') {
      const show = (state.statFilter === 'Pending' && newStatus === 'Pending') ||
                   (state.statFilter === newStatus);
      if(!show) {
        _expandedItems.delete('item-'+id);
        itemEl.remove();
        // Update section counts
        document.querySelectorAll('.section-count').forEach(sc => {
          const section = sc.closest ? null : null; // let renderStats handle it
        });
      }
    }
  }
  renderStats();
  saveState();
}

function updateField(id, field, val) {
  const proj = getProj();
  if(!proj) return;
  Object.values(proj.data).forEach(sections=>sections.forEach(sec=>sec.items.forEach(item=>{
    if(item.id===id) item[field]=val;
  })));
  saveState();
}

function handleImport(e) {
  const file = e.target.files[0];
  if(!file) return;
  
  if (file.name.endsWith('.html')) {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const text = ev.target.result;
        const match = text.match(/<!-- SecList_STATE:(.*?) -->/);
        if (match && match[1]) {
          const proj = JSON.parse(decodeURIComponent(atob(match[1])));
          proj.id = 'proj_'+Date.now();
          if(!proj.name) proj.name = 'Imported Project';
          state.projects.push(proj);
          state.activeProject = proj.id;
          saveState();
          renderAll();
        } else {
          alert('No valid project state found in HTML.');
        }
      } catch(err){ alert('Failed to parse HTML state.'); }
    };
    reader.readAsText(file);
  } else if (file.name.endsWith('.xlsx')) {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, {type: 'array'});

        const rows = XLSX.utils.sheet_to_json(ws);
