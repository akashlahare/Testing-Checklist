    {"id":"and_4","num":"4","title":"Cleartext HTTP Traffic Allowed","sev":"High","status":"Pending","desc":"App allows unencrypted HTTP traffic either via android:usesCleartextTraffic=true or permissive network_security_config.xml.\n\nSteps to Test:\n1. Check AndroidManifest.xml for usesCleartextTraffic\n2. Check res/xml/network_security_config.xml for cleartextTrafficPermitted\n3. Run app through Burp and look for http:// requests","risk":"Credentials, tokens, and sensitive data transmitted over HTTP can be intercepted by any attacker on the same network.","rec":"Set android:usesCleartextTraffic=false. Ensure all API endpoints use HTTPS.","remarks":""},
    {"id":"and_5","num":"5","title":"Dangerous / Unnecessary Permissions","sev":"Medium","status":"Pending","desc":"App requests sensitive permissions (READ_CONTACTS, ACCESS_FINE_LOCATION, READ_SMS, CAMERA) that are not required for its functionality.\n\nSteps to Test:\n1. Check AndroidManifest.xml <uses-permission> entries\n2. Compare listed permissions against app features\n3. Run: aapt dump permissions app.apk","risk":"Over-privileged apps present larger attack surface. If compromised, attacker can access contacts, location, SMS, and camera.","rec":"Request only permissions essential to core functionality. Use runtime permissions.","remarks":""},
    {"id":"and_6","num":"6","title":"Exported Components Without Permission","sev":"High","status":"Pending","desc":"Activities, Services, or BroadcastReceivers are exported (android:exported=true) without requiring any permission, allowing external apps to invoke them.\n\nSteps to Test:\n1. Parse AndroidManifest.xml for exported components\n2. Run: adb shell am start -n <pkg>/<activity>\n3. Try: adb shell am broadcast -a <action> -n <pkg>/<receiver>","risk":"Attacker app or adb command launches internal activities, invokes services, or sends broadcasts, bypassing authentication screens.","rec":"Set android:exported=false for all components not intentionally public. Add android:permission to restrict access to exported components.","remarks":""},
    {"id":"and_7","num":"7","title":"Weak APK Signing Algorithm","sev":"High","status":"Pending","desc":"APK is signed using the deprecated v1 signing scheme only (JAR signing), or uses MD5/SHA1 in the signing certificate.\n\nSteps to Test:\n1. Run: apksigner verify --verbose app.apk\n2. Check if only v1 signature is present (no v2 or v3)\n3. Run: keytool -printcert -jarfile app.apk","risk":"v1-only signed APKs are vulnerable to Janus attack (CVE-2017-13156) on Android 5-8 allowing code injection without signature invalidation.","rec":"Sign APKs with v2 and v3 signing schemes. Use SHA256withRSA or SHA256withECDSA. Avoid MD5 and SHA1 signing algorithms.","remarks":""},
    {"id":"and_8","num":"8","title":"Missing or Partial Code Obfuscation","sev":"Medium","status":"Pending","desc":"Release APK contains readable class names, method names, and string constants making reverse engineering trivial.\n\nSteps to Test:\n1. Decompile: jadx -d out/ app.apk\n2. Browse out/sources/ — if class names are meaningful (UserRepository, PaymentManager) → no obfuscation\n3. Check proguard-rules.pro for keep rules that over-expose classes","risk":"Attacker reads business logic, discovers API endpoints, finds hardcoded values, and identifies security checks to bypass.","rec":"Enable R8/ProGuard in release builds. Minimize keep rules. Apply string obfuscation for sensitive string constants.","remarks":""}
  ]},
  {"cat":"Cryptography","items":[
    {"id":"and_9","num":"9","title":"Hardcoded Secrets in APK","sev":"Critical","status":"Pending","desc":"API keys, passwords, tokens, or encryption keys are written directly in source code, strings.xml, or config files inside the APK.\n\nSteps to Test:\n1. Decompile: jadx -d out/ app.apk\n2. Search: grep -ri 'key|secret|password|token|api' out/resources/\n3. Search source: grep -ri 'apikey|secret|password|privatekey' out/sources/\n4. Check BuildConfig.java and Constants.java\n5. Check assets/ and res/raw/ folders\n6. Run MobSF automated scan","risk":"Any person who downloads the APK can extract these secrets in minutes with jadx. Exposed keys enable backend API abuse, auth bypass, or cloud access.","rec":"Never hardcode secrets in the APK. Retrieve secrets at runtime from a secure backend. Use Android Keystore for on-device keys.","remarks":""},
    {"id":"and_10","num":"10","title":"Weak Cryptographic Algorithm","sev":"High","status":"Pending","desc":"App uses outdated or broken algorithms such as MD5, SHA1, DES, or 3DES for security-sensitive cryptographic operations.\n\nSteps to Test:\n1. Search decompiled code: grep -ri 'MD5|SHA1|DES|RC4|Blowfish' out/sources/\n2. Check MessageDigest.getInstance() and Cipher.getInstance() calls\n3. Run MobSF and check crypto findings","risk":"MD5 and SHA1 have known collision attacks. DES has 56-bit keys brute-forceable in hours.","rec":"Use AES-256-GCM for encryption. Use SHA-256 or SHA-512 for hashing. Use BCrypt or Argon2 for password hashing.","remarks":""},
    {"id":"and_11","num":"11","title":"AES in ECB Mode","sev":"High","status":"Pending","desc":"App uses AES encryption with ECB (Electronic Codebook) mode which produces identical ciphertext for identical plaintext blocks.\n\nSteps to Test:\n1. Search: grep -ri 'AES/ECB|AES\\/ECB' out/sources/\n2. Look for Cipher.getInstance('AES') without mode — defaults to ECB on Android\n3. Capture encrypted payloads and check for repeated patterns","risk":"ECB mode does not provide semantic security. Patterns in plaintext are visible in ciphertext. Attacker can identify and replay blocks.","rec":"Use AES/GCM/NoPadding for authenticated encryption. Never use ECB mode for any security-sensitive operation.","remarks":""},
    {"id":"and_12","num":"12","title":"Static IV or Static Salt","sev":"High","status":"Pending","desc":"Initialization Vector (IV) or salt value is hardcoded or reused across encryptions, weakening the cipher.\n\nSteps to Test:\n1. Search: grep -ri 'IvParameterSpec|SecretKeySpec' out/sources/\n2. Check if IV is a fixed byte array literal\n3. Check if salt is hardcoded string passed to key derivation","risk":"Static IV with CBC mode allows pattern analysis. Static salt in key derivation defeats the purpose of salting and enables precomputed attacks.","rec":"Generate a cryptographically random IV for each encryption using SecureRandom. Generate random salt for each key derivation. Store IV/salt alongside ciphertext.","remarks":""},
    {"id":"and_13","num":"13","title":"Weak Random Number Generator","sev":"High","status":"Pending","desc":"App uses java.util.Random or Math.random() for security-sensitive random value generation (tokens, OTPs, keys).\n\nSteps to Test:\n1. Search: grep -ri 'new Random()|Math.random()' out/sources/\n2. Check usage context — if used for token/OTP/key generation → critical finding","risk":"java.util.Random is a pseudo-random generator predictable with known seed. Attacker predicts generated tokens, OTPs, or session IDs.","rec":"Use java.security.SecureRandom for all security-sensitive random value generation. Never seed SecureRandom manually.","remarks":""},
    {"id":"and_14","num":"14","title":"Keys Not in Android Keystore","sev":"High","status":"Pending","desc":"Cryptographic keys are stored in SharedPreferences, files, or hardcoded in code instead of the hardware-backed Android Keystore.\n\nSteps to Test:\n1. Search for KeyStore.getInstance() usage — if absent, keys not in Keystore\n2. Check if keys are stored as base64 strings in SharedPreferences\n3. Check if keys are derived from static passwords","risk":"Keys stored in files or SharedPreferences are extractable on rooted devices. Android Keystore keys are hardware-protected and cannot be exported.","rec":"Generate and store all cryptographic keys in Android Keystore using KeyPairGenerator or KeyGenerator with KeyGenParameterSpec.","remarks":""}
  ]},
  {"cat":"Secure Coding","items":[
    {"id":"and_15","num":"15","title":"printStackTrace() in Production","sev":"Low","status":"Pending","desc":"App uses e.printStackTrace() or System.out.println() for error handling, which prints stack traces to Android logcat.\n\nSteps to Test:\n1. Search: grep -ri 'printStackTrace|System.out.print' out/sources/\n2. Run app: adb logcat | grep -i 'error|exception'\n3. Trigger error conditions (wrong password, bad network) and monitor output","risk":"Stack traces reveal internal class structure, file paths, and logic flow. Via adb logcat, attackers map the app internals for targeted attacks.","rec":"Remove all printStackTrace() from release builds. Use a logging framework (Timber) with log-level control. Disable verbose logging in production.","remarks":""},
    {"id":"and_16","num":"16","title":"Dynamic Code Loading Risk","sev":"High","status":"Pending","desc":"App loads DEX files, JARs, or APKs at runtime from external storage or untrusted sources using DexClassLoader.\n\nSteps to Test:\n1. Search: grep -ri 'DexClassLoader|PathClassLoader|loadClass' out/sources/\n2. Check the source path parameter — is it from external storage or network?\n3. Try replacing the DEX file with a malicious one on external storage","risk":"Attacker replaces the dynamically loaded code file with malicious code that executes with the app's permissions.","rec":"Avoid loading code from external sources. If required, sign and verify dynamically loaded code. Load only from internal app storage.","remarks":""},
    {"id":"and_17","num":"17","title":"PendingIntent Misconfiguration","sev":"Medium","status":"Pending","desc":"PendingIntents are created with implicit intents or missing FLAG_IMMUTABLE/FLAG_UPDATE_CURRENT flags, allowing hijacking by other apps.\n\nSteps to Test:\n1. Search: grep -ri 'PendingIntent' out/sources/\n2. Check if base intent is explicit (has component set) or implicit\n3. Check flags: missing FLAG_IMMUTABLE on Android 12+ is a warning","risk":"Malicious app intercepts the PendingIntent and modifies its extras or replaces the target, enabling privilege escalation or data theft.","rec":"Always use explicit intents in PendingIntent. Use FLAG_IMMUTABLE for PendingIntents that should not be modified.","remarks":""},
    {"id":"and_18","num":"18","title":"Firebase / API Keys Exposed","sev":"Critical","status":"Pending","desc":"Firebase API keys, google-services.json credentials, or other cloud API keys are present in the APK without server-side restrictions.\n\nSteps to Test:\n1. Extract: unzip app.apk assets/google-services.json\n2. Check google-services.json for api_key values\n3. Search: grep -ri 'firebase|AAAA|AIza' out/resources/\n4. Test Firebase key: curl 'https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=<key>'","risk":"Exposed Firebase keys with permissive security rules allow unauthenticated access to the entire database and storage.","rec":"Restrict Firebase API key usage to your app's SHA fingerprint in Firebase Console. Enforce Firebase Security Rules. Never commit google-services.json to public repos.","remarks":""}
  ]},
  {"cat":"Data Storage","items":[
    {"id":"and_19","num":"19","title":"Sensitive Data in SharedPreferences (Plaintext)","sev":"High","status":"Pending","desc":"App stores tokens, passwords, or PII in SharedPreferences as plaintext XML files accessible on rooted devices.\n\nSteps to Test:\n1. Install app on rooted device or emulator\n2. Log in / perform sensitive action\n3. Run: adb shell su -c 'cat /data/data/<pkg>/shared_prefs/*.xml'\n4. Check content for tokens, passwords, user data\n5. Also pull backup: adb backup -noapk <pkg>","risk":"Attacker with physical access or ADB extracts SharedPreferences XML files and reads tokens or credentials without any decryption.","rec":"Use EncryptedSharedPreferences from Jetpack Security library. Never store passwords or session tokens in plaintext SharedPreferences.","remarks":""},
    {"id":"and_20","num":"20","title":"Sensitive Data in SQLite Database","sev":"High","status":"Pending","desc":"Local SQLite database stores sensitive user data, tokens, or PII in cleartext tables without encryption.\n\nSteps to Test:\n1. On rooted device: adb shell su -c 'ls /data/data/<pkg>/databases/'\n2. Pull: adb pull /data/data/<pkg>/databases/<db>.db\n3. Open with DB Browser for SQLite\n4. Check tables for sensitive columns (password, token, ssn, card_number)","risk":"Attacker with rooted access or device backup extracts database and reads all stored sensitive records.","rec":"Encrypt database using SQLCipher. Or encrypt individual sensitive columns before storage. Apply Android Data Protection API to database files.","remarks":""},
    {"id":"and_21","num":"21","title":"Sensitive Data on External Storage","sev":"High","status":"Pending","desc":"App writes sensitive files (tokens, user data, logs) to external storage (SD card or /sdcard/) accessible by any app with READ_EXTERNAL_STORAGE permission.\n\nSteps to Test:\n1. Search: grep -ri 'getExternalStorage|Environment.getExternalFilesDir' out/sources/\n2. Monitor file writes: adb shell inotifywait -m /sdcard/ during app operation","risk":"Any installed app with READ_EXTERNAL_STORAGE permission can read files from external storage, exposing sensitive data to other apps.","rec":"Store all sensitive files in internal storage (getFilesDir(), getDataDir()). Never write tokens, credentials, or PII to external storage.","remarks":""},
    {"id":"and_22","num":"22","title":"Sensitive Data in Android Logcat","sev":"Medium","status":"Pending","desc":"App logs sensitive information such as tokens, passwords, PII, or API responses to Android logcat.\n\nSteps to Test:\n1. Connect device and run: adb logcat | grep -i '<pkg>'\n2. Perform login, payment, and sensitive operations\n3. Monitor logcat for tokens, passwords, card numbers","risk":"Any app with READ_LOGS permission reads sensitive data from logcat. Developer-only logs often leak to production builds.","rec":"Strip all sensitive data from log statements. Use ProGuard to remove Log calls in release builds. Never log tokens, passwords, or PII.","remarks":""},
    {"id":"and_23","num":"23","title":"Sensitive Data Copied to Clipboard","sev":"Medium","status":"Pending","desc":"App allows passwords, OTPs, card numbers, or tokens to be copied to the system clipboard accessible by other apps.\n\nSteps to Test:\n1. In app, long-press on password or token field — check if Copy option appears\n2. Copy the value, then: adb shell service call clipboard 2\n3. Check if sensitive value is in clipboard","risk":"Malicious apps or keyboard apps with clipboard access read sensitive data copied by the user.","rec":"Set android:textIsSelectable=false on password fields. Use TYPE_TEXT_VARIATION_PASSWORD. Clear clipboard after sensitive operations.","remarks":""},
    {"id":"and_24","num":"24","title":"Sensitive Data Visible in App Switcher","sev":"Medium","status":"Pending","desc":"App does not set the secure flag or blur the screen when backgrounded, causing screenshots of sensitive screens to appear in the app switcher.\n\nSteps to Test:\n1. Navigate to a screen with sensitive data (account balance, messages)\n2. Press the Home/Recents button\n3. Check the app thumbnail in the recent apps list","risk":"Physical attacker or malicious app using OBSERVE_SCREEN permission can see sensitive data through the recent apps thumbnail.","rec":"Add getWindow().setFlags(WindowManager.LayoutParams.FLAG_SECURE) in Activity.onCreate() for sensitive screens.","remarks":""},
    {"id":"and_25","num":"25","title":"Sensitive Data in App Cache","sev":"Medium","status":"Pending","desc":"App caches API responses, images, or documents containing sensitive data in the app cache directory without encryption.\n\nSteps to Test:\n1. Perform sensitive operations (view statements, messages)\n2. On rooted device: adb shell su -c 'ls /data/data/<pkg>/cache/'\n3. Pull and inspect cache files: adb pull /data/data/<pkg>/cache/","risk":"Cached sensitive data persists after logout and can be extracted on rooted devices or via backup.","rec":"Disable HTTP response caching for sensitive API calls. Clear cache on logout. Encrypt cached files for any data that must be cached.","remarks":""},
    {"id":"and_26","num":"26","title":"Sensitive Data in App Memory","sev":"Medium","status":"Pending","desc":"Passwords, encryption keys, or sensitive strings remain in heap memory longer than necessary and are recoverable via memory dump.\n\nSteps to Test:\n1. Enter password in app\n2. On rooted device use Fridump: python fridump.py -u -s <pid>\n3. Search dump: strings dump.bin | grep -i 'password|token'","risk":"Attacker with root access dumps app memory and recovers plaintext passwords, keys, and tokens from heap.","rec":"Use char[] instead of String for passwords (char arrays can be zeroed). Zero out sensitive arrays after use.","remarks":""}
  ]},
  {"cat":"Network Security","items":[
    {"id":"and_27","num":"27","title":"No SSL Certificate Pinning","sev":"Critical","status":"Pending","desc":"App accepts any certificate signed by a trusted CA, allowing a proxy to intercept and view all HTTPS traffic.\n\nSteps to Test:\n1. Install Burp Suite CA cert on test device\n2. Configure device proxy → Burp Suite IP:8080\n3. Browse the app and check if traffic appears in Burp Suite HTTP History\n4. If API calls are visible in plaintext → no pinning","risk":"Attacker on the same network performs MitM attack and intercepts all API calls including credentials, tokens, and sensitive data in transit.","rec":"Implement SSL/TLS certificate pinning using OkHttp CertificatePinner or network_security_config.xml pin-set. Pin the public key hash of your server certificate.","remarks":""},
    {"id":"and_28","num":"28","title":"SSL Pinning Bypass","sev":"Critical","status":"Pending","desc":"Implemented certificate pinning can be bypassed using Frida, Objection, or SSL Kill Switch tools on rooted devices.\n\nSteps to Test:\n1. Confirm pinning is in place (Burp fails without bypass)\n2. Run: objection -g <pkg> explore → android sslpinning disable\n3. Try: frida -U -f <pkg> -l pinning-bypass.js\n4. If Burp intercepts after bypass → implementation defeated","risk":"Attacker on rooted device bypasses pinning to intercept and tamper with all API traffic including authenticated requests.","rec":"Add anti-root and anti-debugging checks alongside pinning. Use multi-layer pinning (OkHttp + network_security_config). Detect Frida presence at runtime.","remarks":""},
    {"id":"and_29","num":"29","title":"Weak TLS Version or Cipher Suite","sev":"High","status":"Pending","desc":"App or server accepts TLS 1.0 / 1.1 connections or weak cipher suites (RC4, NULL, EXPORT, DES, 3DES).\n\nSteps to Test:\n1. Run testssl.sh against API server: ./testssl.sh --protocols api.example.com\n2. Check for TLS 1.0/1.1 support: POODLE, BEAST vulnerabilities\n3. Run: nmap --script ssl-enum-ciphers -p 443 api.example.com","risk":"Downgrade attacks force TLS 1.0 connections vulnerable to POODLE and BEAST. Weak ciphers allow decryption of captured traffic.","rec":"Enforce TLS 1.2 minimum (TLS 1.3 preferred). Disable all weak cipher suites.","remarks":""},
    {"id":"and_30","num":"30","title":"Improper Certificate Validation","sev":"High","status":"Pending","desc":"App implements a custom TrustManager or HostnameVerifier that accepts any certificate or any hostname.\n\nSteps to Test:\n1. Search: grep -ri 'TrustManager|checkServerTrusted|ALLOW_ALL_HOSTNAME' out/sources/\n2. Check if checkServerTrusted() has empty body (accepts all certs)\n3. Test with self-signed cert in Burp — if accepted → broken validation","risk":"App accepts any certificate including self-signed and expired ones. Attacker performs MitM with any certificate without needing CA trust.","rec":"Remove all custom TrustManager and HostnameVerifier implementations. Use the default Android TLS validation.","remarks":""},
    {"id":"and_31","num":"31","title":"Sensitive Data in API Response (Unmasked)","sev":"High","status":"Pending","desc":"API responses return full sensitive values (card numbers, SSN, passwords, tokens) that should be masked or omitted.\n\nSteps to Test:\n1. Intercept all API responses with Burp Suite\n2. Look for full credit card numbers, CVV, SSN, passwords, private keys\n3. Check profile/account APIs for over-exposure of PII","risk":"Exposed sensitive data in transit or logs can be captured. Over-exposure in API responses enables data harvesting.","rec":"Mask sensitive fields server-side (e.g., card number as ****1234). Return only data the client needs.","remarks":""}
  ]},
  {"cat":"Authentication & Session","items":[
    {"id":"and_32","num":"32","title":"Session Token Not Invalidated on Logout","sev":"High","status":"Pending","desc":"After logout, the old session token continues to be accepted by the server for API calls.\n\nSteps to Test:\n1. Log in and capture session token from Authorization header in Burp Suite\n2. Log out through the app\n3. Replay the old token using Burp Suite Repeater\n4. If server returns valid data → session not properly invalidated","risk":"Attacker who steals a session token can continue using it indefinitely even after the victim has logged out.","rec":"Invalidate tokens server-side on logout. Maintain a server-side token blacklist or use short-lived tokens with refresh token rotation.","remarks":""},
    {"id":"and_33","num":"33","title":"OTP / PIN Brute Force Possible","sev":"Critical","status":"Pending","desc":"OTP or PIN verification endpoint does not enforce rate limiting or lockout, allowing unlimited guessing attempts.\n\nSteps to Test:\n1. Capture OTP verification request in Burp Suite\n2. Send to Intruder and run number sequence from 0000 to 9999\n3. Check if any attempt returns HTTP 200 (success)\n4. Monitor for any lockout or CAPTCHA after multiple failures","risk":"Attacker brute-forces 4-digit OTP (10,000 combinations) in seconds via automated requests, gaining account takeover.","rec":"Enforce rate limiting (max 5 OTP attempts). Implement account lockout after failed attempts. Use OTPs with short expiry (60-120 seconds).","remarks":""},
    {"id":"and_34","num":"34","title":"Weak JWT Configuration","sev":"Critical","status":"Pending","desc":"JWT tokens use weak algorithms (alg:none, HS256 with weak secret), or do not validate expiry and audience claims.\n\nSteps to Test:\n1. Capture JWT from Authorization header\n2. Decode at jwt.io — check alg field\n3. If HS256: try known weak secrets with hashcat or jwt_tool\n4. Modify alg to 'none' and remove signature — test if server accepts","risk":"Forged or expired JWTs grant unauthorized access. Weak HMAC secrets enable JWT forgery without private key.","rec":"Use RS256 with 2048-bit RSA keys. Validate alg, exp, iss, aud claims server-side. Reject alg:none tokens.","remarks":""},
    {"id":"and_35","num":"35","title":"Session Timeout Missing","sev":"Medium","status":"Pending","desc":"App does not implement session timeout, keeping sessions active indefinitely without user re-authentication.\n\nSteps to Test:\n1. Log in and capture session token\n2. Leave session idle for 30+ minutes\n3. Replay the token in Burp Suite\n4. If still valid → no timeout","risk":"Stolen session token remains valid indefinitely. Physical device access allows long-term account access without re-authentication.","rec":"Implement server-side session timeout (15-30 minutes of inactivity for sensitive apps). Force re-authentication for sensitive operations after timeout.","remarks":""},
    {"id":"and_36","num":"36","title":"Account Lockout Missing","sev":"High","status":"Pending","desc":"Login endpoint does not lock the account or implement progressive delays after multiple failed authentication attempts.\n\nSteps to Test:\n1. Capture login request in Burp Suite\n2. Run Intruder with password list against known username\n3. Monitor if any requests are blocked or delayed after N failures","risk":"Attacker performs credential stuffing or password spraying attacks without any account protection mechanism.","rec":"Lock account for 15-30 minutes after 5-10 failed attempts. Send lockout notification email. Implement CAPTCHA after 3 failures.","remarks":""},
    {"id":"and_37","num":"37","title":"Weak Password Policy","sev":"Medium","status":"Pending","desc":"App accepts very short or simple passwords (e.g., '1234', 'password') without enforcing complexity requirements.\n\nSteps to Test:\n1. During registration, try setting password: '1234', 'password', 'a'\n2. Check if any are accepted by the server\n3. Try changing password to a single character","risk":"Weak passwords are easily guessed or brute-forced. Credential stuffing with common password lists succeeds more often.","rec":"Enforce minimum 8 characters with complexity (uppercase, lowercase, number, symbol). Check against known breached password lists.","remarks":""}
  ]},
  {"cat":"Runtime & Anti-Tampering","items":[
    {"id":"and_38","num":"38","title":"Root Detection Missing or Bypassable","sev":"High","status":"Pending","desc":"App does not detect rooted devices, or its root detection is trivially bypassed, allowing deeper analysis on a rooted environment.\n\nSteps to Test:\n1. Install app on rooted device (Magisk)\n2. Check if app runs normally → detection missing\n3. If detected: objection -g <pkg> explore → android root disable\n4. Try Magisk DenyList or Shamiko module\n5. Use Frida to hook and return false on root check method","risk":"On rooted devices, attacker reads app memory, modifies runtime behavior, extracts keys from Keystore, and hooks any function using Frida.","rec":"Multi-layered root detection: check su binary, Magisk files, build tags, test-keys signature. Use Google Play Integrity API as the strongest attestation signal.","remarks":""},
    {"id":"and_39","num":"39","title":"Emulator Detection Missing or Bypassable","sev":"Medium","status":"Pending","desc":"App runs in Android emulator without detection, enabling automated analysis and scripted attacks.\n\nSteps to Test:\n1. Run app in Android Studio emulator or Genymotion\n2. Check if app runs normally → no emulator detection\n3. If detected, bypass with: frida hook on Build.FINGERPRINT checks","risk":"Automated tools run against emulator instances to perform mass analysis, bypass rate limits, or test attacks at scale.","rec":"Check Build.FINGERPRINT, Build.MODEL for emulator signatures. Detect QEMU drivers. Combine with Play Integrity API device attestation.","remarks":""},
    {"id":"and_40","num":"40","title":"APK Tampering Detection Missing","sev":"High","status":"Pending","desc":"App does not verify its own signature at runtime, allowing repackaged or modified APKs to run as legitimate app.\n\nSteps to Test:\n1. Decompile app, add malicious code, repackage and sign with test key\n2. Install modified APK on device\n3. If app runs normally → no integrity check","risk":"Attacker distributes modified APK with malware that captures credentials while appearing to be the legitimate app.","rec":"Verify app signature at runtime using PackageManager.getSigningInfo(). Use Google Play Integrity API to verify APK integrity from server side.","remarks":""},
    {"id":"and_41","num":"41","title":"Frida / Hook Detection Missing","sev":"High","status":"Pending","desc":"App does not detect Frida instrumentation framework or other hooking tools, allowing runtime manipulation of any function.\n\nSteps to Test:\n1. Attach Frida to app: frida -U -f <pkg>\n2. If app runs normally → no Frida detection\n3. Hook sensitive functions and verify they can be overridden","risk":"Attacker uses Frida to hook authentication, payment, and security functions at runtime to bypass them without modifying the APK.","rec":"Detect frida-server process, frida-agent library, and suspicious /proc/maps entries. Use native code for critical security checks.","remarks":""},
    {"id":"and_42","num":"42","title":"Anti-Debugging Missing","sev":"Medium","status":"Pending","desc":"App allows debuggers to attach to its process, enabling step-by-step analysis of security-sensitive code paths.\n\nSteps to Test:\n1. Run: adb jdwp (look for app PID)\n2. Attach debugger: adb forward tcp:8700 jdwp:<pid>\n3. Connect Android Studio debugger to localhost:8700\n4. If breakpoints hit in app code → no anti-debug","risk":"Attacker attaches debugger to step through authentication bypass, payment processing, or key extraction code.","rec":"Check android:debuggable=false in release manifest. Implement native ptrace(PTRACE_TRACEME) self-attachment to block external debuggers.","remarks":""},
    {"id":"and_43","num":"43","title":"Play Integrity / Device Attestation Missing","sev":"High","status":"Pending","desc":"App does not use Google Play Integrity API or SafetyNet to verify device integrity and app authenticity server-side.\n\nSteps to Test:\n1. Check source for PlayIntegrityManager or SafetyNet API usage\n2. If absent → no device attestation\n3. Check if server validates the integrity verdict before sensitive operations","risk":"Without attestation, app cannot distinguish legitimate installations from modified APKs running on compromised devices.","rec":"Integrate Google Play Integrity API. Validate integrity token server-side before allowing sensitive operations like payments.","remarks":""}
  ]},
  {"cat":"WebView & IPC","items":[
    {"id":"and_44","num":"44","title":"WebView JavaScript with Exposed Java Bridge","sev":"High","status":"Pending","desc":"WebView has JavaScript enabled and exposes Java objects via addJavascriptInterface(), allowing JS code to call native Android methods.\n\nSteps to Test:\n1. Search: grep -ri 'addJavascriptInterface|setJavaScriptEnabled' out/sources/\n2. If found, check what URL the WebView loads\n3. Test XSS in any loaded URL parameter","risk":"If WebView loads untrusted content or is vulnerable to XSS, attacker's JavaScript can invoke native Android APIs including file access, SMS, and camera.","rec":"Avoid addJavascriptInterface on Android < 17. Disable JavaScript unless necessary. Validate all URLs loaded in WebView against an allowlist.","remarks":""},
    {"id":"and_45","num":"45","title":"WebView File Access Enabled","sev":"High","status":"Pending","desc":"WebView has setAllowFileAccess(true) or setAllowUniversalAccessFromFileURLs(true) enabling file:// URI access and cross-origin data theft.\n\nSteps to Test:\n1. Search: grep -ri 'setAllowFileAccess|setAllowUniversalAccess|setAllowFileAccessFromFileURLs' out/sources/\n2. If enabled, test with a file:// URL pointing to /data/data/<pkg>/","risk":"Attacker loads malicious HTML via file:// URL in WebView to read arbitrary local files and exfiltrate app data.","rec":"Set setAllowFileAccess(false) and setAllowUniversalAccessFromFileURLs(false). Load only https:// URLs in WebViews.","remarks":""},
    {"id":"and_46","num":"46","title":"WebView Debugging Enabled","sev":"Medium","status":"Pending","desc":"WebView debugging is enabled via WebView.setWebContentsDebuggingEnabled(true) allowing Chrome DevTools access to WebView content.\n\nSteps to Test:\n1. Search: grep -ri 'setWebContentsDebuggingEnabled' out/sources/\n2. If true: connect Android device to Chrome\n3. Open chrome://inspect — look for the app's WebView","risk":"Attacker with USB access opens Chrome DevTools to read WebView DOM, cookies, localStorage, and execute arbitrary JavaScript.","rec":"Call WebView.setWebContentsDebuggingEnabled(false) or conditionally enable only in debug builds using BuildConfig.DEBUG check.","remarks":""},
    {"id":"and_47","num":"47","title":"Insecure Deep Link Handling","sev":"Medium","status":"Pending","desc":"App handles deep links or custom URL schemes without validating input parameters, enabling open redirects or unauthorized screen access.\n\nSteps to Test:\n1. Check AndroidManifest.xml for intent-filter with scheme and host\n2. Send crafted deep link: adb shell am start -a android.intent.action.VIEW -d 'myapp://screen?token=stolen'\n3. Check if sensitive screens are accessible without authentication","risk":"Attacker sends phishing link that launches specific app screens with attacker-controlled parameters, enabling auth bypass or data injection.","rec":"Validate all deep link parameters server-side. Require authentication before deep link destinations. Use App Links (verified https://) instead of custom schemes.","remarks":""}

    {"id":"and_48","num":"48","title":"Biometric Authentication Bypassable","sev":"High","status":"Pending","desc":"Biometric authentication is implemented without binding a CryptoObject, making it possible to bypass by hooking the success callback.\n\nSteps to Test:\n1. Find biometric auth: BiometricPrompt.authenticate in source\n2. Check if CryptoObject is passed to authenticate()\n3. If no CryptoObject: hook with Frida to override onAuthenticationSucceeded\n4. Run: objection -g <pkg> explore → android ui bypass biometric\n5. Check if app unlocks without real fingerprint","risk":"Attacker hooks onAuthenticationSucceeded callback with Frida to fake a successful fingerprint auth without providing a real biometric.","rec":"Always pass a CryptoObject to BiometricPrompt.authenticate(). Perform the sensitive operation only using the cipher from the authenticated callback.","remarks":""}

  {"cat":"API Security","items":[
    {"id":"and_49","num":"49","title":"Broken Access Control / IDOR","sev":"Critical","status":"Pending","desc":"API endpoints use predictable identifiers (user IDs, order IDs) without server-side authorization checks to verify ownership.\n\nSteps to Test:\n1. Set up Burp Suite proxy and log in with test account A\n2. Capture API calls that reference object IDs\n3. Log in with test account B in a separate session\n4. Use Account A's token but change the ID to Account B's object ID\n5. If data is returned → IDOR confirmed","risk":"Authenticated attacker accesses or modifies any other user's data by changing numeric IDs in requests (e.g. /api/user/1234 → /api/user/1235).","rec":"Implement server-side authorization checks on every API endpoint. Verify ownership of every requested object. Use UUIDs instead of sequential integers.","remarks":""},
    {"id":"and_50","num":"50","title":"Sensitive Data in URL Parameters","sev":"Medium","status":"Pending","desc":"App sends sensitive data (tokens, passwords, PII) as URL query parameters which appear in server logs and browser history.\n\nSteps to Test:\n1. Intercept all requests in Burp Suite\n2. Look for tokens, passwords, or PII in URL query strings\n3. Check: ?token=xxx, ?password=xxx, ?email=xxx patterns","risk":"Tokens and sensitive data in URLs are logged in server access logs, proxy logs, and browser history.","rec":"Pass sensitive data in request body (POST/PUT) or Authorization header. Never include tokens or credentials in URL query parameters.","remarks":""},
    {"id":"and_51","num":"51","title":"API Rate Limiting Missing","sev":"High","status":"Pending","desc":"API endpoints do not enforce rate limits, allowing unlimited requests and enabling brute force, scraping, and DoS attacks.\n\nSteps to Test:\n1. Identify authentication and OTP endpoints\n2. Send 100+ requests/minute using Burp Suite Intruder or script\n3. Monitor for HTTP 429 (Too Many Requests) or any throttling","risk":"No rate limiting enables password brute force, OTP enumeration, data scraping, and denial of service through API flooding.","rec":"Implement rate limiting per IP and per account (e.g., 10 req/min for auth endpoints). Return 429 with Retry-After header. Use API gateway with WAF rules.","remarks":""},
    {"id":"and_52","num":"52","title":"Server-Side Injection (SQLi / Command)","sev":"Critical","status":"Pending","desc":"API parameters are passed unsanitized to SQL queries or OS commands, enabling data extraction or server compromise.\n\nSteps to Test:\n1. Identify all input parameters (search, filter, ID fields)\n2. Test SQL injection: add ' OR '1'='1, ' OR SLEEP(5)--, ' UNION SELECT...\n3. Use sqlmap: sqlmap -r request.txt --dbs\n4. Test command injection: ; id, && whoami","risk":"SQL injection allows complete database dump including all user records. Command injection enables remote code execution on the server.","rec":"Use parameterized queries / prepared statements for all DB operations. Sanitize and validate all inputs server-side. Apply principle of least privilege to DB accounts.","remarks":""},

function escHtml(str){
  if(!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

}
